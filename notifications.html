<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>✨ CRYSTAL SPHERE | إشعارات</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>:root{--glass:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.1);--accent:#667eea;--bg:#0f0c29}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh;overflow-y:auto}.header{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(15,12,41,0.8);backdrop-filter:blur(20px);z-index:10}.btn-back{background:rgba(102,126,234,0.1);border:1px solid var(--border);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;font-size:16px}.notif-item{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);align-items:center;transition:background 0.2s}.notif-item:hover{background:rgba(102,126,234,0.05)}.notif-item.unread{background:rgba(102,126,234,0.08)}.notif-icon{width:42px;height:42px;border-radius:50%;background:rgba(102,126,234,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent);flex-shrink:0}.notif-content{flex:1}.notif-msg{font-size:14px;line-height:1.4}.notif-time{font-size:11px;opacity:0.4;margin-top:4px}.spinner{width:32px;height:32px;border:3px solid rgba(102,126,234,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:30px auto}@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body>
<div class="header"><button class="btn-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i></button><h2>🔔 الإشعارات</h2></div>
<div id="notifsList"><div class="spinner"></div></div>
<script src="firebase-config.js"></script>
<script>let currentUser=null;auth.onAuthStateChanged(u=>{if(!u){window.location.href='auth.html';return}currentUser=u;loadNotifs()});function loadNotifs(){db.ref('notifications/'+currentUser.uid).on('value',snap=>{const ns=snap.val()||{};const c=document.getElementById('notifsList');const items=Object.entries(ns).reverse();if(!items.length){c.innerHTML='<div style="text-align:center;opacity:0.5;padding:60px"><i class="fas fa-bell" style="font-size:48px;color:#667eea;margin-bottom:12px;display:block;opacity:0.3"></i><p>لا توجد إشعارات</p></div>';return}c.innerHTML=items.map(([key,n])=>'<div class="notif-item '+(n.read?'':'unread')+'"><div class="notif-icon"><i class="fas fa-'+(n.type==='follow'?'user-plus':n.type==='like'?'heart':n.type==='comment'?'comment':n.type==='message'?'envelope':n.type==='broadcast'?'bullhorn':'bell')+'"></i></div><div class="notif-content"><div class="notif-msg"><strong>@'+(n.from||'مستخدم')+'</strong> '+(n.msg||'')+'</div><div class="notif-time">'+new Date(n.timestamp).toLocaleString('ar-SA')+'</div></div></div>').join('')})}</script>
</body>
</html>
