<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>✨ CRYSTAL SPHERE | ملفي</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--glass:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.1);--accent:#667eea;--accent2:#764ba2;--bg:#0f0c29}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh;overflow-y:auto;overflow-x:hidden}
        .load-center{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;color:rgba(255,255,255,0.5)}
        .spinner{width:40px;height:40px;border:3px solid rgba(102,126,234,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .cover-section{position:relative;height:250px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:50px;transition:background 0.5s}
        .btn-back{position:fixed;top:16px;right:16px;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:18px;transition:all 0.3s}
        .btn-back:hover{background:rgba(102,126,234,0.3)}
        .btn-cover-edit{position:absolute;top:16px;left:16px;background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;z-index:50;transition:all 0.3s}
        .btn-cover-edit:hover{background:rgba(102,126,234,0.3)}
        .avatar-container{width:120px;height:120px;border-radius:50%;overflow:hidden;border:4px solid rgba(102,126,234,0.6);box-shadow:0 12px 40px rgba(102,126,234,0.3);cursor:pointer;position:relative;z-index:2;transition:transform 0.3s}
        .avatar-container:hover{transform:scale(1.05)}
        .avatar-container img{width:100%;height:100%;object-fit:cover}
        .avatar-edit-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.3s;font-size:24px}
        .avatar-container:hover .avatar-edit-overlay{opacity:1}
        .profile-info{text-align:center;padding:10px 20px 0}
        .username-display{font-size:24px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
        .verified-badge{color:#667eea;font-size:18px}
        .banned-badge{color:#f87171;font-size:13px;background:rgba(239,68,68,0.2);padding:4px 12px;border-radius:20px}
        .bio-display{font-size:14px;opacity:0.7;margin:8px 0;line-height:1.6}
        .meta-info{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;font-size:12px;opacity:0.6;margin:8px 0}
        .meta-info span{display:flex;align-items:center;gap:4px}
        .website-link{color:#667eea;text-decoration:none}
        .last-seen{font-size:11px;opacity:0.4;margin:4px 0}
        .stats-row{display:flex;justify-content:center;gap:35px;margin:20px 0}
        .stat-item{text-align:center;cursor:pointer;transition:transform 0.2s;padding:8px;border-radius:12px}
        .stat-item:hover{transform:scale(1.05);background:rgba(102,126,234,0.05)}
        .stat-number{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .stat-label{font-size:12px;opacity:0.5;margin-top:2px}
        .action-buttons{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:16px 0}
        .btn{padding:10px 24px;border-radius:30px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.3s;display:flex;align-items:center;gap:6px}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 8px 25px rgba(102,126,234,0.3)}
        .btn-primary:hover{box-shadow:0 12px 35px rgba(102,126,234,0.5);transform:translateY(-2px)}
        .btn-outline{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#fff}
        .btn-outline:hover{background:rgba(102,126,234,0.1)}
        .btn-danger{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);color:#f87171}
        .btn-danger:hover{background:rgba(239,68,68,0.3)}
        .btn-warning{background:rgba(251,191,36,0.2);border:1px solid rgba(251,191,36,0.3);color:#fbbf24}
        .btn-success{background:rgba(52,211,153,0.2);border:1px solid rgba(52,211,153,0.3);color:#34d399}
        .profile-tabs{display:flex;border-bottom:1px solid var(--border);margin-top:10px;position:sticky;top:0;background:rgba(15,12,41,0.9);backdrop-filter:blur(20px);z-index:30}
        .profile-tab{flex:1;padding:14px;text-align:center;cursor:pointer;font-size:14px;font-weight:500;color:rgba(255,255,255,0.5);border-bottom:2px solid transparent;transition:all 0.3s;background:none;border-left:none;border-right:none;border-top:none}
        .profile-tab.active{color:#fff;border-bottom-color:var(--accent)}
        .tab-content{display:none;padding:12px}
        .tab-content.active{display:block}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
        .thumb{aspect-ratio:9/16;background:rgba(255,255,255,0.03);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.2s}
        .thumb:hover{transform:scale(1.03);z-index:1}
        .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
        .thumb i{position:absolute;z-index:1;font-size:22px;opacity:0;transition:opacity 0.3s}
        .thumb:hover i{opacity:1}
        .thumb .likes-badge{position:absolute;bottom:4px;left:4px;font-size:10px;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:10px;z-index:2}
        .thumb .delete-btn{position:absolute;top:4px;right:4px;width:24px;height:24px;background:rgba(239,68,68,0.8);border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:3;font-size:10px;cursor:pointer;opacity:0;transition:opacity 0.3s}
        .thumb:hover .delete-btn{opacity:1}
        .user-list-item{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.2s}
        .user-list-item:hover{background:rgba(102,126,234,0.05)}
        .user-list-avatar{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
        .user-list-avatar img{width:100%;height:100%;object-fit:cover}
        .user-list-info{flex:1}
        .user-list-name{font-weight:600;display:flex;align-items:center;gap:6px}
        .modal-overlay{position:fixed;inset:0;background:rgba(15,12,41,0.95);backdrop-filter:blur(30px);z-index:500;display:flex;flex-direction:column}
        .modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--border)}
        .modal-body{flex:1;overflow-y:auto;padding:8px}
        .admin-section{margin:20px 16px;padding:20px;background:rgba(102,126,234,0.05);border-radius:20px;border:1px solid rgba(102,126,234,0.2)}
        .admin-title{font-size:18px;font-weight:700;color:#667eea;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .admin-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
        .admin-stat-card{background:rgba(0,0,0,0.3);border-radius:12px;padding:14px;text-align:center}
        .admin-stat-num{font-size:24px;font-weight:800;color:#667eea}
        .admin-stat-lbl{font-size:10px;opacity:0.5;margin-top:4px}
        .admin-subtitle{font-size:14px;font-weight:600;color:#764ba2;margin:16px 0 12px;display:flex;align-items:center;gap:6px}
        .admin-user-item{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.3);padding:12px;border-radius:12px;margin-bottom:6px;flex-wrap:wrap;gap:8px}
        .admin-user-left{display:flex;align-items:center;gap:8px}
        .admin-avatar-sm{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0}
        .admin-avatar-sm img{width:100%;height:100%;object-fit:cover}
        .admin-actions{display:flex;gap:4px;flex-wrap:wrap}
        .admin-btn-sm{padding:6px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:none;font-weight:600;color:#fff;transition:all 0.2s;white-space:nowrap}
        .admin-btn-sm:hover{transform:scale(1.05)}
        .btn-verify-user{background:rgba(52,211,153,0.3);color:#34d399}
        .btn-unverify-user{background:rgba(251,191,36,0.3);color:#fbbf24}
        .btn-ban-user{background:rgba(239,68,68,0.3);color:#f87171}
        .btn-unban-user{background:rgba(52,211,153,0.3);color:#34d399}
        .btn-delete-video{background:rgba(239,68,68,0.3);color:#f87171}
        .btn-broadcast{background:rgba(102,126,234,0.3);color:#667eea}
        .admin-search{width:100%;padding:12px 16px;border-radius:30px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#fff;font-size:14px;outline:none;margin-bottom:12px}
        .admin-video-item{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.3);padding:10px;border-radius:10px;margin-bottom:6px;flex-wrap:wrap;gap:8px}
        .badge{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600}
        .badge-danger{background:rgba(239,68,68,0.3);color:#f87171}
        .badge-success{background:rgba(52,211,153,0.3);color:#34d399}
        .badge-warning{background:rgba(251,191,36,0.3);color:#fbbf24}
    </style>
</head>
<body>
<div id="loader" class="load-center"><div class="spinner"></div><span>✨ تحميل الملف الشخصي...</span></div>
<div id="content" style="display:none">
    <div class="cover-section" id="profileCover">
        <button class="btn-back" onclick="goBack()"><i class="fas fa-arrow-right"></i></button>
        <button class="btn-cover-edit" id="editCoverBtn"><i class="fas fa-palette"></i> تغيير الغلاف</button>
        <div class="avatar-container" id="avatarDisplay">
            <img src="" alt="avatar" id="avatarImg">
            <div class="avatar-edit-overlay"><i class="fas fa-camera"></i></div>
        </div>
    </div>
    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
    <div class="profile-info">
        <div class="username-display">
            <span id="nameDisplay">@username</span>
            <span class="verified-badge" id="verifiedBadge" style="display:none">✅</span>
            <span class="banned-badge" id="bannedBadge" style="display:none"><i class="fas fa-ban"></i> محظور</span>
        </div>
        <div class="bio-display" id="bioDisplay">✨ مرحباً!</div>
        <div class="last-seen" id="lastSeen"></div>
        <div class="meta-info">
            <span id="locationDisplay" style="display:none"><i class="fas fa-map-marker-alt"></i> <span></span></span>
            <span id="websiteDisplay" style="display:none"><i class="fas fa-globe"></i> <a class="website-link" href="#" target="_blank"></a></span>
            <span><i class="fas fa-calendar-alt"></i> <span id="joinedDate"></span></span>
        </div>
    </div>
    <div class="stats-row">
        <div class="stat-item" id="statPosts"><div class="stat-number">0</div><div class="stat-label">منشورات</div></div>
        <div class="stat-item" id="statFollowers"><div class="stat-number">0</div><div class="stat-label">متابعون</div></div>
        <div class="stat-item" id="statFollowing"><div class="stat-number">0</div><div class="stat-label">يتابع</div></div>
        <div class="stat-item" id="statLikes"><div class="stat-number">0</div><div class="stat-label">إعجابات</div></div>
    </div>
    <div class="action-buttons" id="actionsBar"></div>
    <div class="profile-tabs">
        <button class="profile-tab active" onclick="switchProfileTab('videos', this)"><i class="fas fa-th"></i> المنشورات</button>
        <button class="profile-tab" onclick="switchProfileTab('liked', this)"><i class="fas fa-heart"></i> أعجبني</button>
    </div>
    <div class="tab-content active" id="tabVideos"><div class="grid" id="videosGrid"></div></div>
    <div class="tab-content" id="tabLiked"><div class="grid" id="likedGrid"></div></div>
    <div id="adminSection" style="display:none"></div>
</div>
<script src="firebase-config.js"></script>
<script>
    let profileUserId = null;
    let currentUser = null;
    let currentUserData = null;
    let allUsers = {};
    let allVideos = [];
    let isOwnProfile = false;
    let isAdmin = false;
    const params = new URLSearchParams(window.location.search);
    profileUserId = params.get('uid');

    auth.onAuthStateChanged(async u => {
        if (!u) { window.location.href = 'auth.html'; return; }
        currentUser = u;
        const snap = await db.ref('users/' + u.uid).get();
        if (snap.exists()) currentUserData = { uid: u.uid, ...snap.val() };
        if (!profileUserId) profileUserId = u.uid;
        isOwnProfile = (profileUserId === u.uid);
        isAdmin = ADMIN_EMAILS.includes(u.email || '');
        await loadAllData();
        await loadProfile();
        document.getElementById('loader').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        if (isAdmin) { document.getElementById('adminSection').style.display = 'block'; loadAdminPanel(); }
    });

    async function loadAllData() {
        const us = await db.ref('users').once('value'); allUsers = us.val() || {};
        const vs = await db.ref('videos').once('value'); allVideos = vs.val() ? Object.entries(vs.val()).map(([k,v]) => ({id:k, ...v})) : [];
    }

    async function loadProfile() {
        const u = allUsers[profileUserId];
        if (!u) { document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px;opacity:0.5">❌ المستخدم غير موجود</div>'; return; }
        document.getElementById('profileCover').style.background = u.coverColor || COVER_COLORS[0];
        document.getElementById('avatarImg').src = u.avatarUrl || (DICEBEAR_URL + '?seed=' + profileUserId);
        document.getElementById('nameDisplay').innerText = '@' + (u.username || 'مستخدم');
        if (u.isVerified) document.getElementById('verifiedBadge').style.display = 'inline';
        else document.getElementById('verifiedBadge').style.display = 'none';
        if (u.banned) document.getElementById('bannedBadge').style.display = 'inline';
        else document.getElementById('bannedBadge').style.display = 'none';
        document.getElementById('bioDisplay').innerText = u.bio || '✨ مرحباً! أنا جديد في Crystal Sphere';
        if (u.lastSeen) {
            const d = new Date(u.lastSeen);
            const now = Date.now();
            const diff = (now - u.lastSeen) / 1000;
            let txt = '';
            if (diff < 60) txt = '🟢 متصل الآن';
            else if (diff < 3600) txt = '🟡 آخر ظهور قبل ' + Math.floor(diff/60) + ' دقيقة';
            else if (diff < 86400) txt = '🟠 آخر ظهور قبل ' + Math.floor(diff/3600) + ' ساعة';
            else txt = '🔴 آخر ظهور ' + d.toLocaleDateString('ar-SA');
            document.getElementById('lastSeen').innerText = txt;
        }
        const locEl = document.getElementById('locationDisplay');
        if (u.location) { locEl.style.display = 'flex'; locEl.querySelector('span').innerText = u.location; }
        else locEl.style.display = 'none';
        const webEl = document.getElementById('websiteDisplay');
        if (u.website) { webEl.style.display = 'flex'; const link = webEl.querySelector('a'); link.href = u.website.startsWith('http') ? u.website : 'https://' + u.website; link.innerText = u.website.replace(/^https?:\/\//, ''); }
        else webEl.style.display = 'none';
        const d = new Date(u.createdAt || Date.now());
        document.getElementById('joinedDate').innerText = d.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });
        const userVideos = allVideos.filter(v => v.sender === profileUserId);
        const followersCount = Object.keys(u.followers || {}).length;
        const followingCount = Object.keys(u.following || {}).length;
        const totalLikes = userVideos.reduce((s, v) => s + (v.likes || 0), 0);
        document.getElementById('statPosts').querySelector('.stat-number').innerText = userVideos.length;
        document.getElementById('statFollowers').querySelector('.stat-number').innerText = followersCount;
        document.getElementById('statFollowing').querySelector('.stat-number').innerText = followingCount;
        document.getElementById('statLikes').querySelector('.stat-number').innerText = totalLikes;
        document.getElementById('statFollowers').onclick = () => showUserList('متابعون', u.followers || {});
        document.getElementById('statFollowing').onclick = () => showUserList('يتابع', u.following || {});
        const actionsBar = document.getElementById('actionsBar');
        const editCoverBtn = document.getElementById('editCoverBtn');
        const avatarDisplay = document.getElementById('avatarDisplay');
        if (isOwnProfile) {
            actionsBar.innerHTML = '<button class="btn btn-primary" onclick="editProfile()"><i class="fas fa-edit"></i> تعديل الملف</button><button class="btn btn-outline" onclick="shareProfile()"><i class="fas fa-share"></i> مشاركة</button><button class="btn btn-outline" onclick="auth.signOut();window.location.href=\'auth.html\'"><i class="fas fa-sign-out-alt"></i> خروج</button>';
            editCoverBtn.style.display = 'block';
            avatarDisplay.onclick = () => document.getElementById('avatarInput').click();
        } else {
            const isFollowing = currentUserData?.following && currentUserData.following[profileUserId];
            actionsBar.innerHTML = (isFollowing ? '<button class="btn btn-primary" onclick="toggleFollowBtn()"><i class="fas fa-check"></i> متابع</button><button class="btn btn-outline" onclick="goToChat()"><i class="fas fa-comment"></i> مراسلة</button>' : '<button class="btn btn-primary" onclick="toggleFollowBtn()"><i class="fas fa-plus"></i> متابعة</button>') + '<button class="btn btn-outline" onclick="shareProfile()"><i class="fas fa-share"></i> مشاركة</button>';
            editCoverBtn.style.display = 'none';
            avatarDisplay.style.cursor = 'default';
            avatarDisplay.onclick = null;
        }
        renderVideoGrid('videosGrid', userVideos);
        const likedVideos = allVideos.filter(v => v.likedBy && v.likedBy[profileUserId]);
        renderVideoGrid('likedGrid', likedVideos);
    }

    function renderVideoGrid(gridId, videos) {
        const grid = document.getElementById(gridId);
        if (!videos.length) { grid.innerHTML = '<div style="text-align:center;opacity:0.5;padding:40px;grid-column:1/-1"><i class="fas fa-video" style="font-size:36px;display:block;margin-bottom:8px;opacity:0.3"></i>لا توجد منشورات</div>'; return; }
        grid.innerHTML = videos.map(v => '<div class="thumb" onclick="window.open(\''+v.url+'\',\'_blank\')">'+(v.thumbnail?'<img src="'+v.thumbnail+'" loading="lazy">':'')+'<i class="fas fa-play"></i><span class="likes-badge">❤️ '+(v.likes||0)+'</span>'+(isAdmin?'<div class="delete-btn" onclick="event.stopPropagation();deleteVideo(\''+v.id+'\')"><i class="fas fa-trash"></i></div>':'')+'</div>').join('');
    }

    function switchProfileTab(tab, el) {
        document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        if (el) el.classList.add('active');
        document.getElementById(tab === 'videos' ? 'tabVideos' : 'tabLiked').classList.add('active');
    }

    window.editProfile = async function() {
        const u = allUsers[profileUserId];
        const name = prompt('اسم المستخدم:', u?.username || '');
        const bio = prompt('السيرة الذاتية:', u?.bio || '');
        const location = prompt('الموقع:', u?.location || '');
        const website = prompt('الموقع الإلكتروني:', u?.website || '');
        if (name !== null && bio !== null && location !== null && website !== null) {
            await db.ref('users/' + profileUserId).update({ username: name, bio: bio, location: location, website: website });
            await loadAllData(); await loadProfile();
        }
    };

    window.toggleFollowBtn = async function() {
        if (!currentUser || currentUser.uid === profileUserId) return;
        const userRef = db.ref('users/' + currentUser.uid + '/following/' + profileUserId);
        const targetRef = db.ref('users/' + profileUserId + '/followers/' + currentUser.uid);
        const snap = await userRef.get();
        if (snap.exists()) { await userRef.remove(); await targetRef.remove(); }
        else { await userRef.set(true); await targetRef.set(true);
            db.ref('notifications/' + profileUserId).push({ from: currentUserData?.username || 'مستخدم', msg: 'بدأ بمتابعتك ✨', type: 'follow', timestamp: Date.now(), read: false }); }
        await loadAllData(); await loadProfile();
    };

    window.shareProfile = function() { navigator.clipboard.writeText(window.location.href); alert('✅ تم نسخ رابط الملف الشخصي'); };
    window.goToChat = function() { window.location.href = 'chat.html?uid=' + profileUserId; };
    window.goBack = function() { window.location.href = 'index.html'; };

    async function showUserList(title, usersObj) {
        const userIds = Object.keys(usersObj);
        let html = '<div class="modal-overlay" id="userListModal"><div class="modal-header"><h3>'+title+' ('+userIds.length+')</h3><button class="btn-close" onclick="document.getElementById(\'userListModal\').remove()" style="background:rgba(102,126,234,0.1);border:1px solid var(--border);color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px">✕</button></div><div class="modal-body">';
        if (!userIds.length) html += '<div style="text-align:center;opacity:0.5;padding:40px">لا يوجد</div>';
        else for (const uid of userIds) { const user = allUsers[uid]; if (!user) continue;
            html += '<div class="user-list-item" onclick="window.location.href=\'profile.html?uid='+uid+'\';document.getElementById(\'userListModal\').remove()"><div class="user-list-avatar"><img src="'+(user.avatarUrl||(DICEBEAR_URL+'?seed='+uid))+'" alt="avatar"></div><div class="user-list-info"><div class="user-list-name">@'+(user.username||'مستخدم')+(user.isVerified?' <span class="verified-badge">✅</span>':'')+'</div><div style="font-size:12px;opacity:0.5;margin-top:2px">'+(user.bio?user.bio.substring(0,50):'')+'</div></div><i class="fas fa-chevron-left" style="opacity:0.3"></i></div>'; }
        html += '</div></div>';
        document.body.insertAdjacentHTML('beforeend', html);
    }

    async function uploadAvatar(input) {
        const file = input.files[0]; if (!file) return;
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
        try {
            const res = await fetch('https://api.cloudinary.com/v1_1/'+CLOUD_NAME+'/image/upload', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.secure_url) { await db.ref('users/'+profileUserId).update({ avatarUrl: data.secure_url, hasCustomAvatar: true }); document.getElementById('avatarImg').src = data.secure_url; }
        } catch(e) { alert('❌ فشل رفع الصورة'); }
    }

    document.getElementById('editCoverBtn').addEventListener('click', async function() {
        const idx = prompt('اختر غلاف (1-'+COVER_COLORS.length+'):');
        if (idx && idx >= 1 && idx <= COVER_COLORS.length) {
            const nc = COVER_COLORS[idx-1];
            await db.ref('users/'+profileUserId+'/coverColor').set(nc);
            document.getElementById('profileCover').style.background = nc;
        }
    });

    // ═══════════════════════════════════════
    // 👑 ADMIN PANEL
    // ═══════════════════════════════════════
    async function loadAdminPanel() {
        const us = allUsers;
        const vs = {};
        allVideos.forEach(v => vs[v.id] = v);
        const totalLikes = Object.values(vs).reduce((s, v) => s + (v.likes || 0), 0);
        const verifiedCount = Object.values(us).filter(u => u.isVerified).length;
        const bannedCount = Object.values(us).filter(u => u.banned).length;
        const onlineCount = Object.values(us).filter(u => u.lastSeen && (Date.now() - u.lastSeen) < 300000).length;

        document.getElementById('adminSection').innerHTML = `
            <div class="admin-section">
                <div class="admin-title"><i class="fas fa-shield-alt"></i> لوحة تحكم الأدمن 👑</div>
                <div class="admin-stats-grid">
                    <div class="admin-stat-card"><div class="admin-stat-num">${Object.keys(us).length}</div><div class="admin-stat-lbl">👥 مستخدمين</div></div>
                    <div class="admin-stat-card"><div class="admin-stat-num">${Object.keys(vs).length}</div><div class="admin-stat-lbl">🎬 فيديوهات</div></div>
                    <div class="admin-stat-card"><div class="admin-stat-num">${totalLikes}</div><div class="admin-stat-lbl">❤️ إعجابات</div></div>
                    <div class="admin-stat-card"><div class="admin-stat-num">${onlineCount}</div><div class="admin-stat-lbl">🟢 متصلين</div></div>
                </div>
                <div class="admin-stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:12px">
                    <div class="admin-stat-card"><div class="admin-stat-num" style="color:#34d399">${verifiedCount}</div><div class="admin-stat-lbl">✅ موثقين</div></div>
                    <div class="admin-stat-card"><div class="admin-stat-num" style="color:#f87171">${bannedCount}</div><div class="admin-stat-lbl">🚫 محظورين</div></div>
                    <div class="admin-stat-card"><button class="admin-btn-sm btn-broadcast" onclick="broadcastMessage()" style="margin-top:8px"><i class="fas fa-bullhorn"></i> إشعار جماعي</button></div>
                </div>
                
                <div class="admin-subtitle"><i class="fas fa-search"></i> بحث عن مستخدم</div>
                <input type="text" class="admin-search" id="adminSearchInput" placeholder="🔍 ابحث عن مستخدم..." onkeyup="searchAdminUsers()">
                
                <div class="admin-subtitle"><i class="fas fa-users"></i> إدارة المستخدمين</div>
                <div id="adminUsersList" style="max-height:350px;overflow-y:auto">
                    ${Object.entries(us).slice(0, 20).map(([id, u]) => `
                        <div class="admin-user-item">
                            <div class="admin-user-left">
                                <div class="admin-avatar-sm"><img src="${u.avatarUrl || (DICEBEAR_URL+'?seed='+id)}" alt="avatar"></div>
                                <div>
                                    <div style="font-weight:600;font-size:13px">@${u.username||'مستخدم'}
                                        ${u.isVerified?'<span class="badge badge-success">✅ موثق</span>':''}
                                        ${u.banned?'<span class="badge badge-danger">🚫 محظور</span>':''}
                                    </div>
                                    <div style="font-size:10px;opacity:0.5">${u.email||''}</div>
                                </div>
                            </div>
                            <div class="admin-actions">
                                <button class="admin-btn-sm ${u.isVerified?'btn-unverify-user':'btn-verify-user'}" onclick="toggleVerifyUser('${id}')">${u.isVerified?'إلغاء التوثيق':'✅ توثيق'}</button>
                                <button class="admin-btn-sm ${u.banned?'btn-unban-user':'btn-ban-user'}" onclick="toggleBanUser('${id}')">${u.banned?'🔓 فك الحظر':'🚫 حظر'}</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="admin-subtitle" style="margin-top:20px"><i class="fas fa-video"></i> أحدث الفيديوهات</div>
                <div id="adminVideosList" style="max-height:300px;overflow-y:auto">
                    ${allVideos.slice(0, 10).map(v => {
                        const u = allUsers[v.sender] || {};
                        return `
                        <div class="admin-video-item">
                            <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
                                <i class="fas fa-play-circle" style="color:#667eea;flex-shrink:0"></i>
                                <span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(v.description||'فيديو').substring(0, 40)}</span>
                                <span style="font-size:10px;opacity:0.5">❤️ ${v.likes||0}</span>
                            </div>
                            <button class="admin-btn-sm btn-delete-video" onclick="deleteVideo('${v.id}')"><i class="fas fa-trash"></i> حذف</button>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;

        window.searchAdminUsers = function() {
            const q = document.getElementById('adminSearchInput').value.toLowerCase();
            const filtered = Object.entries(us).filter(([id, u]) => 
                (u.username||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q)
            );
            document.getElementById('adminUsersList').innerHTML = filtered.slice(0, 20).map(([id, u]) => `
                <div class="admin-user-item">
                    <div class="admin-user-left">
                        <div class="admin-avatar-sm"><img src="${u.avatarUrl || (DICEBEAR_URL+'?seed='+id)}" alt="avatar"></div>
                        <div>
                            <div style="font-weight:600;font-size:13px">@${u.username||'مستخدم'}
                                ${u.isVerified?'<span class="badge badge-success">✅ موثق</span>':''}
                                ${u.banned?'<span class="badge badge-danger">🚫 محظور</span>':''}
                            </div>
                            <div style="font-size:10px;opacity:0.5">${u.email||''}</div>
                        </div>
                    </div>
                    <div class="admin-actions">
                        <button class="admin-btn-sm ${u.isVerified?'btn-unverify-user':'btn-verify-user'}" onclick="toggleVerifyUser('${id}')">${u.isVerified?'إلغاء التوثيق':'✅ توثيق'}</button>
                        <button class="admin-btn-sm ${u.banned?'btn-unban-user':'btn-ban-user'}" onclick="toggleBanUser('${id}')">${u.banned?'🔓 فك الحظر':'🚫 حظر'}</button>
                    </div>
                </div>
            `).join('') || '<div style="text-align:center;opacity:0.5;padding:20px">لا توجد نتائج</div>';
        };

        window.toggleVerifyUser = async function(uid) {
            if (confirm('تأكيد تغيير حالة التوثيق؟')) {
                const r = await db.ref('users/' + uid).once('value');
                const d = r.val();
                await db.ref('users/' + uid).update({ isVerified: !d.isVerified, verifiedAt: !d.isVerified ? Date.now() : null, verifiedBy: !d.isVerified ? currentUser.email : null });
                db.ref('notifications/' + uid).push({ from: 'الإدارة', msg: (!d.isVerified ? '✨ تم توثيق حسابك!' : 'تم إلغاء توثيق حسابك'), type: 'system', timestamp: Date.now(), read: false });
                await loadAllData(); await loadProfile(); loadAdminPanel();
            }
        };

        window.toggleBanUser = async function(uid) {
            const r = await db.ref('users/' + uid).once('value');
            const d = r.val();
            const reason = !d.banned ? prompt('سبب الحظر:') : '';
            if (!d.banned && !reason) return;
            if (confirm('تأكيد ' + (!d.banned ? 'حظر' : 'فك الحظر عن') + ' هذا المستخدم؟')) {
                await db.ref('users/' + uid).update({ banned: !d.banned, banReason: !d.banned ? reason : '' });
                if (!d.banned) {
                    db.ref('notifications/' + uid).push({ from: 'الإدارة', msg: '🚫 تم حظر حسابك. السبب: ' + reason, type: 'system', timestamp: Date.now(), read: false });
                    auth.signOut();
                }
                await loadAllData(); await loadProfile(); loadAdminPanel();
            }
        };

        window.deleteVideo = async function(vid) {
            if (confirm('تأكيد حذف هذا الفيديو؟')) {
                const snap = await db.ref('videos/' + vid).get();
                const v = snap.val();
                if (v && v.sender) await db.ref('users/' + v.sender + '/posts/' + vid).remove();
                await db.ref('videos/' + vid).remove();
                await loadAllData(); await loadProfile(); loadAdminPanel();
            }
        };

        window.broadcastMessage = function() {
            const msg = prompt('📢 رسالة الإشعار الجماعي:');
            if (msg) {
                if (confirm('إرسال: "' + msg + '" إلى جميع المستخدمين؟')) {
                    const promises = Object.keys(us).map(uid =>
                        db.ref('notifications/' + uid).push({ from: 'الإدارة 👑', msg: msg, type: 'broadcast', timestamp: Date.now(), read: false })
                    );
                    Promise.all(promises).then(() => alert('✅ تم إرسال الإشعار الجماعي بنجاح!'));
                }
            }
        };
    }
</script>
</body>
</html>
