<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>✨ CRYSTAL SPHERE | استكشاف</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>:root{--glass:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.1);--accent:#667eea;--accent2:#764ba2;--bg:#0f0c29}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh;overflow-y:auto}.header{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(15,12,41,0.8);backdrop-filter:blur(20px);z-index:10}.btn-back{background:rgba(102,126,234,0.1);border:1px solid var(--border);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;font-size:16px}.search-bar{flex:1;display:flex;align-items:center;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:30px;padding:8px 16px;gap:8px}.search-bar input{flex:1;background:none;border:none;color:#fff;font-size:14px;outline:none}.section-title{padding:16px 16px 8px;font-weight:700;font-size:16px;opacity:0.7}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:0 2px}.thumb{aspect-ratio:9/16;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.2s}.thumb:hover{transform:scale(1.03);z-index:1}.thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.thumb i{position:absolute;font-size:22px;color:#fff;z-index:1;opacity:0;transition:opacity 0.3s}.thumb:hover i{opacity:1}.thumb .likes-badge{position:absolute;bottom:4px;left:4px;font-size:10px;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:10px}.user-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.2s}.user-card:hover{background:rgba(102,126,234,0.05)}.user-avatar{width:50px;height:50px;border-radius:50%;overflow:hidden;flex-shrink:0}.user-avatar img{width:100%;height:100%;object-fit:cover}.spinner{width:32px;height:32px;border:3px solid rgba(102,126,234,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:30px auto}@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body>
<div class="header"><button class="btn-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i></button><div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="ابحث عن مستخدمين..." onkeyup="doSearch()"></div></div>
<div id="searchResults" style="display:none"></div>
<div id="mainContent"><div class="section-title">🔥 الأكثر شيوعاً</div><div class="grid" id="exploreGrid"><div class="spinner" style="grid-column:1/-1"></div></div><div class="section-title">👥 مستخدمون مميزون</div><div id="featuredUsers"></div></div>
<script src="firebase-config.js"></script>
<script>let currentUser=null,allVideos=[],allUsers={};auth.onAuthStateChanged(async u=>{if(!u){window.location.href='auth.html';return}currentUser=u;await loadData()});async function loadData(){const us=await db.ref('users').once('value');allUsers=us.val()||{};const vs=await db.ref('videos').once('value');allVideos=vs.val()?Object.entries(vs.val()).map(([k,v])=>({id:k,...v})).sort((a,b)=>(b.likes||0)-(a.likes||0)):[];const topVids=allVideos.slice(0,30);document.getElementById('exploreGrid').innerHTML=topVids.length?topVids.map(v=>'<div class="thumb" onclick="window.open(''+v.url+'','_blank')">'+(v.thumbnail?'<img src="'+v.thumbnail+'" loading="lazy">':'')+'<i class="fas fa-play"></i><span class="likes-badge">❤️ '+(v.likes||0)+'</span></div>').join(''):'<div style="text-align:center;opacity:0.5;padding:40px;grid-column:1/-1">لا توجد فيديوهات</div>';const usersArr=Object.entries(allUsers).filter(([id,u])=>!u.banned&&Object.keys(u.followers||{}).length>0).sort((a,b)=>(Object.keys(b[1].followers||{}).length)-(Object.keys(a[1].followers||{}).length)).slice(0,10);document.getElementById('featuredUsers').innerHTML=usersArr.map(([id,u])=>'<div class="user-card" onclick="window.location.href='profile.html?uid='+id+''"><div class="user-avatar"><img src="'+(u.avatarUrl||(DICEBEAR_URL+'?seed='+id))+'" alt="avatar"></div><div style="flex:1"><div style="font-weight:600">@'+(u.username||'مستخدم')+' '+(u.isVerified?'<span style="color:#667eea">✅</span>':'')+'</div><div style="font-size:12px;opacity:0.5">'+Object.keys(u.followers||{}).length+' متابع</div></div><i class="fas fa-chevron-left" style="opacity:0.3"></i></div>').join('')}function doSearch(){const q=document.getElementById('searchInput').value.toLowerCase();if(!q){document.getElementById('searchResults').style.display='none';document.getElementById('mainContent').style.display='block';return}document.getElementById('mainContent').style.display='none';document.getElementById('searchResults').style.display='block';const mu=Object.entries(allUsers).filter(([id,u])=>u.username?.toLowerCase().includes(q)||u.bio?.toLowerCase().includes(q));document.getElementById('searchResults').innerHTML=mu.length?mu.map(([id,u])=>'<div class="user-card" onclick="window.location.href='profile.html?uid='+id+''"><div class="user-avatar"><img src="'+(u.avatarUrl||(DICEBEAR_URL+'?seed='+id))+'" alt="avatar"></div><div style="flex:1"><div style="font-weight:600">@'+(u.username||'مستخدم')+' '+(u.isVerified?'<span style="color:#667eea">✅</span>':'')+'</div><div style="font-size:12px;opacity:0.5">'+(u.bio?u.bio.substring(0,50):'')+'</div></div><i class="fas fa-chevron-left" style="opacity:0.3"></i></div>').join(''):'<div style="text-align:center;opacity:0.5;padding:40px">لا توجد نتائج</div>'}</script>
</body>
</html>
